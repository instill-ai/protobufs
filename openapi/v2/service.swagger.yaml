      - VIEW_BASIC
      - VIEW_FULL
      - VIEW_RECIPE
    description: |-
      View defines how a Pipeline is presented.

       - VIEW_BASIC: Default view, only includes basic information.
       - VIEW_FULL: Full representation.
       - VIEW_RECIPE: Contains the recipe of the resource.
  v1betaPipelineVisibility:
    type: string
    enum:
      - VISIBILITY_PRIVATE
      - VISIBILITY_PUBLIC
    description: |-
      Visibility defines who can access the pipeline.

       - VISIBILITY_PRIVATE: Only the user can see the pipeline.
       - VISIBILITY_PUBLIC: Other users can see the pipeline.
  v1betaRenameNamespacePipelineResponse:
    type: object
    properties:
      pipeline:
        description: The renamed pipeline resource.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaPipeline'
    description: RenameNamespacePipelineResponse contains a renamed pipeline.
  v1betaRole:
    type: string
    enum:
      - ROLE_VIEWER
      - ROLE_EXECUTOR
    description: |-
      Role describes the permissions a user has over a resource.

       - ROLE_VIEWER: Viewers can see the resource properties.
       - ROLE_EXECUTOR: Executors can execute the resource (e.g. trigger a pipeline).
  v1betaSecret:
    type: object
    properties:
      name:
        type: string
        description: |-
          The name of the secret, define by its ID.
          - Format: `secrets/{secret.id}`.
        readOnly: true
      uid:
        type: string
        description: Secret UUID.
        readOnly: true
      id:
        type: string
        description: |-
          Secret resource ID (used in `name` as the last segment). This conforms
          to RFC-1034, which restricts to letters, numbers, and hyphen, with the
          first character a letter, the last a letter or a number, and a 63
          character maximum.
      createTime:
        type: string
        format: date-time
        description: Creation time.
        readOnly: true
      updateTime:
        type: string
        format: date-time
        description: Update time.
        readOnly: true
      value:
        type: string
        description: The value of the secret, which is input-only and will never be returned in API responses.
      description:
        type: string
        title: Description
    description: API secrets allow users to make requests to the Instill AI API.
  v1betaSharing:
    type: object
    properties:
      users:
        type: object
        additionalProperties:
          $ref: '#/definitions/v1betaSharingUser'
        description: |-
          Defines sharing rules for a set of user resource names.

          Each key in this object should contain a pattern that can be matched
          against user names.

          Each value is a user sharing configuration.

          **NOTE**: For now, the only accepted key is `*/*`.
      shareCode:
        description: Defines the configuration to share a resource via link.
        allOf:
          - $ref: '#/definitions/SharingShareCode'
    description: |-
      Sharing contains the information to share a resource with other users.

      For more information, see [Share Pipelines](https://www.instill.tech/docs/vdp/share).
  v1betaSharingUser:
    type: object
    properties:
      enabled:
        type: boolean
        description: Defines whether the sharing option with this user is enabled.
      role:
        description: Defines the role the user will have over the resource.
        allOf:
          - $ref: '#/definitions/v1betaRole'
    description: Describes the sharing configuration with a given user.
  v1betaStripeSubscriptionDetail:
    type: object
    properties:
      productName:
        type: string
        description: Product name associated with the subscription in Stripe.
        readOnly: true
      id:
        type: string
        description: Unique identifier for the subscription.
        readOnly: true
      itemId:
        type: string
        description: Identifier for the specific item within the subscription.
        readOnly: true
      price:
        type: number
        format: float
        description: Price of the subscription.
        readOnly: true
      canceledAt:
        type: integer
        format: int32
        description: Optional timestamp indicating when the subscription was canceled, if applicable.
        readOnly: true
      trialEnd:
        type: integer
        format: int32
        description: Optional timestamp indicating when the trial ended, if applicable.
        readOnly: true
      status:
        description: Status of the subscription.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaStripeSubscriptionDetailStatus'
      description:
        type: string
        description: Description of the subscription.
        readOnly: true
    description: StripeSubscriptionDetail describes the details of a subscription in Stripe.
  v1betaStripeSubscriptionDetailStatus:
    type: string
    enum:
      - STATUS_INCOMPLETE
      - STATUS_INCOMPLETE_EXPIRED
      - STATUS_TRIALING
      - STATUS_ACTIVE
      - STATUS_PAST_DUE
      - STATUS_CANCELED
      - STATUS_UNPAID
      - STATUS_PAUSED
    description: |-
      Enumerates the status types for the user's subscription.

       - STATUS_INCOMPLETE: Incomplete.
       - STATUS_INCOMPLETE_EXPIRED: Incomplete Expired.
       - STATUS_TRIALING: Trialing.
       - STATUS_ACTIVE: Active.
       - STATUS_PAST_DUE: Past due.
       - STATUS_CANCELED: Canceled.
       - STATUS_UNPAID: Unpaid.
       - STATUS_PAUSED: Paused.
  v1betaSubtractCreditAdminResponse:
    type: object
    properties:
      amount:
        type: number
        format: float
        description: The remaining credit.
    description: |-
      SubtractCreditResponse contains the remaining credit of an account after the
      subtraction.
  v1betaTestNamespaceConnectionResponse:
    type: object
    description: TestNamespaceConnectionResponse is an empty response.
  v1betaTrace:
    type: object
    properties:
      statuses:
        type: array
        items:
          $ref: '#/definitions/v1betaTraceStatus'
        description: Statuses contains an execution status per input.
        readOnly: true
      inputs:
        type: array
        items:
          type: object
        description: Component inputs.
        readOnly: true
      outputs:
        type: array
        items:
          type: object
        description: Component outputs.
        readOnly: true
      error:
        type: object
        description: Error details.
        readOnly: true
      computeTimeInSeconds:
        type: number
        format: float
        description: Computation time in seconds.
        readOnly: true
    description: Trace contains the execution details of a component.
  v1betaTraceStatus:
    type: string
    enum:
      - STATUS_COMPLETED
      - STATUS_SKIPPED
      - STATUS_ERROR
    description: |-
      Status holds the the component execution outcome.

       - STATUS_COMPLETED: Successfully completed.
       - STATUS_SKIPPED: Skipped.
       - STATUS_ERROR: Aborted with error.
  v1betaTriggerAsyncNamespacePipelineReleaseResponse:
    type: object
    properties:
      operation:
        description: Long-running operation information.
        readOnly: true
        allOf:
          - $ref: '#/definitions/googlelongrunningOperation'
    description: |-
      TriggerAsyncNamespacePipelineReleaseResponse contains the information to access
      the status of an asynchronous pipeline execution.
  v1betaTriggerAsyncNamespacePipelineResponse:
    type: object
    properties:
      operation:
        description: Long-running operation information.
        readOnly: true
        allOf:
          - $ref: '#/definitions/googlelongrunningOperation'
    description: |-
      TriggerAsyncNamespacePipelineResponse contains the information to access the
      status of an asynchronous pipeline execution.
  v1betaTriggerData:
    type: object
    properties:
      variable:
        type: object
        title: Variables
      secret:
        type: object
        additionalProperties:
          type: string
        title: Variables
    title: Data
  v1betaTriggerMetadata:
    type: object
    properties:
      traces:
        type: object
        additionalProperties:
          $ref: '#/definitions/v1betaTrace'
        description: |-
          Each key in the `traces` object is a component ID. The value is a Trace
          object containing the execution details.
        readOnly: true
    description: TriggerMetadata contains the traces of the pipeline inference.
  v1betaTriggerNamespacePipelineReleaseResponse:
    type: object
    properties:
      outputs:
        type: array
        items:
          type: object
        description: Model inference outputs.
        readOnly: true
      metadata:
        description: Traces of the pipeline inference.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaTriggerMetadata'
    description: |-
      TriggerNamespacePipelineReleaseResponse contains the pipeline execution results,
      i.e., the multiple model inference outputs.
  v1betaTriggerNamespacePipelineResponse:
    type: object
    properties:
      outputs:
        type: array
        items:
          type: object
        description: Model inference outputs.
        readOnly: true
      metadata:
        description: Traces of the pipeline inference.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaTriggerMetadata'
    description: |-
      TriggerNamespacePipelineResponse contains the pipeline execution results, i.e.,
      the multiple model inference outputs.
  v1betaTriggerNamespacePipelineWithStreamResponse:
    type: object
    properties:
      outputs:
        type: array
        items:
          type: object
        description: Model inference outputs.
        readOnly: true
      metadata:
        description: Traces of the pipeline inference.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaTriggerMetadata'
    description: |-
      TriggerNamespacePipelineWithStreamResponse contains the pipeline execution results, i.e.,
      the multiple model inference outputs.
  v1betaUpdateNamespaceConnectionResponse:
    type: object
    properties:
      connection:
        description: The created connection.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaConnection'
    description: UpdateNamespaceConnectionResponse contains the updated connection.
  v1betaUpdateNamespacePipelineReleaseResponse:
    type: object
    properties:
      release:
        description: The updated pipeline release resource.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaPipelineRelease'
    description: UpdateNamespacePipelineReleaseResponse contains the updated pipeline release.
  v1betaUpdateNamespacePipelineResponse:
    type: object
    properties:
      pipeline:
        description: The updated pipeline resource.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaPipeline'
    description: UpdateNamespacePipelineResponse contains the updated pipeline.
  v1betaUpdateNamespaceSecretResponse:
    type: object
    properties:
      secret:
        description: The updated secret resource.
        allOf:
          - $ref: '#/definitions/v1betaSecret'
    description: UpdateNamespaceSecretResponse contains the updated secret.
  v1betaUpdateOrganizationMembershipResponse:
    type: object
    properties:
      membership:
        description: The updated membership resource.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaOrganizationMembership'
    description: UpdateOrganizationMembershipResponse contains the updated membership.
  v1betaUpdateOrganizationResponse:
    type: object
    properties:
      organization:
        description: The organization resource.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaOrganization'
    description: UpdateOrganizationResponse contains the updated organization.
  v1betaUpdateUserMembershipResponse:
    type: object
    properties:
      membership:
        description: The updated membership resource.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaUserMembership'
    description: UpdateUserMembershipResponse contains the updated membership.
  v1betaUserMembership:
    type: object
    properties:
      name:
        type: string
        description: |-
          The resource name of the membership, which allows its access by user and
          organization ID.
          - Format: `users/{user.id}/memberships/{organization.id}`.
        readOnly: true
      role:
        type: string
        description: Role of the user in the organization.
        readOnly: true
      state:
        description: State of the membership.
        allOf:
          - $ref: '#/definitions/v1betaMembershipState'
      user:
        description: User information.
        readOnly: true
        allOf:
          - $ref: '#/definitions/mgmtv1betaUser'
      organization:
        description: Organization information.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaOrganization'
    description: |-
      A user membership defines the relationship between a user and an
      organization they belong to.
    required:
      - state
  v1betaUserProfile:
    type: object
    properties:
      displayName:
        type: string
        description: Display name.
      bio:
        type: string
        description: Biography.
      avatar:
        type: string
        description: Avatar in base64 format.
      publicEmail:
        type: string
        description: Public email.
      companyName:
        type: string
        description: Company name.
      socialProfileLinks:
        type: object
        additionalProperties:
          type: string
        description: |-
          Social profile links list the links to the user's social profiles.
          The key represents the provider, and the value is the corresponding URL.
    description: UserProfile describes the public data of a user.
  v1betaUserSubscription:
    type: object
    properties:
      plan:
        description: Plan identifier.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaUserSubscriptionPlan'
      detail:
        description: Details of the associated Stripe subscription.
        readOnly: true
        allOf:
          - $ref: '#/definitions/v1betaStripeSubscriptionDetail'
    description: UserSubscription details describe the plan (i.e., features) a user has access to.
  v1betaUserSubscriptionPlan:
    type: string
    enum:
      - PLAN_FREE
      - PLAN_PRO
    description: |-
      Enumerates the plan types for the user subscription.

       - PLAN_FREE: Free plan.
       - PLAN_PRO: Pro plan.
  v1betaValidateNamespacePipelineResponse:
    type: object
    properties:
      success:
        type: boolean
        title: Success
        readOnly: true
      errors:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1betaErrPipelineValidation'
        description: The validated pipeline resource.
        readOnly: true
    description: ValidateNamespacePipelineResponse contains a validated pipeline.
  v1betaValidateTokenResponse:
    type: object
    properties:
      userUid:
        type: string
        description: If token is valid, UUID of the user that owns it.
        readOnly: true
    description: ValidateTokenResponse contains the validation of a token.
  vdppipelinev1betaPermission:
    type: object
    properties:
      canEdit:
        type: boolean
        description: Defines whether the pipeline can be modified.
      canTrigger:
        type: boolean
        description: Defines whether the pipeline can be executed.
      canRelease:
        type: boolean
        description: Defines whether the pipeline can be released.
    description: Permission defines how a pipeline can be used.
  vdppipelinev1betaView:
    type: string
    enum:
      - VIEW_BASIC
      - VIEW_FULL
    description: |-
      View defines how a resource is presented. Most resources can share this view
      definition, the particular meaning of each value should be defined in the
      resource itself. Certain resources might have their own View definition if
      they need to implement more than 2 (basic / full) views.

       - VIEW_BASIC: Default view.
       - VIEW_FULL: Full representation.
securityDefinitions:
  Bearer:
    type: apiKey
    description: Enter the token with the `Bearer ` prefix, e.g. `Bearer abcde12345`
    name: Authorization
    in: header
    x-default: Bearer instill_sk_***
security:
  - Bearer: []
externalDocs:
  description: More about Instill AI
  url: https://www.instill.tech/docs
