definitions:
  AppPublicServiceChatBody:
    type: object
    properties:
      catalogId:
        type: string
        title: Catalog ID
      conversationUid:
        type: string
        title: Conversation UID
      message:
        type: string
        title: User message
      topK:
        type: integer
        format: int64
        title: top k, defaults to 5
    description: |-
      ChatRequest represents a request to send a message
      to a chatbot synchronously and streams back the results.
    required:
      - catalogId
      - conversationUid
      - message
  AppPublicServiceCreateAppBody:
    type: object
    properties:
      id:
        type: string
        description: |-
          The app id.
          the app id should be lowercase without any space or special character besides the hyphen,
          it can not start with number or hyphen, and should be less than 32 characters.
      description:
        type: string
        description: The app description.
      tags:
        type: array
        items:
          type: string
        description: The app tags.
    description: CreateAppRequest represents a request to create a app.
    required:
      - id
  AppPublicServiceCreateConversationBody:
    type: object
    properties:
      conversationId:
        type: string
        title: conversation id. only allow kebab case
    title: CreateConversationRequest is used to create a new conversation
    required:
      - conversationId
  AppPublicServiceCreateMessageBody:
    type: object
    properties:
      content:
        type: string
        title: message content
      role:
        type: string
        title: message role
      type:
        title: message type
        allOf:
          - $ref: '#/definitions/MessageMessageType'
    title: CreateMessageRequest is used to create a new message
    required:
      - content
      - role
      - type
  AppPublicServiceUpdateAppBody:
    type: object
    properties:
      newAppId:
        type: string
        description: |-
          The app id needs to follow the kebab case format.
          if the new app id is not provided, the app id will not be updated.
      newDescription:
        type: string
        description: |-
          The app description.
          If the new description is empty, the description will be set to empty.
      newTags:
        type: array
        items:
          type: string
        description: |-
          The app tags.
          If the new tags is empty, the tags will be set to empty.
      lastAiAssistantAppCatalogUid:
        type: string
        description: |-
          last AI assistant app catalog uid
          If the last AI assistant app catalog uid is empty, the last AI assistant app catalog uid will be set to empty.
      lastAiAssistantAppTopK:
        type: integer
        format: int32
        description: |-
          last AI assistant app top k
          If the last AI assistant app top k is empty, the last AI assistant app top k will be set to empty.
    description: UpdateAppRequest represents a request to update a app.
  AppPublicServiceUpdateConversationBody:
    type: object
    properties:
      newConversationId:
        type: string
        title: new conversation id
      lastUsedCatalogUid:
        type: string
        title: last used catalog uid
      lastUsedTopK:
        type: integer
        format: int64
        title: last used top k
    title: UpdateConversationRequest is used to update a conversation
  AppPublicServiceUpdateMessageBody:
    type: object
    properties:
      content:
        type: string
        title: new message content
    title: UpdateMessageRequest is used to update a message
    required:
      - content
  ArtifactPublicServiceCreateCatalogBody:
    type: object
    properties:
      name:
        type: string
        description: The catalog name.
      description:
        type: string
        description: The catalog description.
      tags:
        type: array
        items:
          type: string
        description: The catalog tags.
    description: CreateCatalogRequest represents a request to create a catalog.
  ArtifactPublicServiceQuestionAnsweringBody:
    type: object
    properties:
      question:
        type: string
        title: question to be answered
      topK:
        type: integer
        format: int32
        title: top k default to 5
    title: QuestionAnsweringRequest
  ArtifactPublicServiceSimilarityChunksSearchBody:
    type: object
    properties:
      textPrompt:
        type: string
        title: text prompt
      topK:
        type: integer
        format: int64
        title: top k
    title: Similar chunk search request
  ArtifactPublicServiceUpdateCatalogBody:
    type: object
    properties:
      description:
        type: string
        description: The catalog description.
      tags:
        type: array
        items:
          type: string
        description: The catalog tags.
    description: UpdateCatalogRequest represents a request to update a catalog.
  ArtifactPublicServiceUpdateChunkBody:
    type: object
    properties:
      retrievable:
        type: boolean
        title: whether the chunk is retrievable
    title: Create chunk response
  ComponentDefinitionSpec:
    type: object
    properties:
      componentSpecification:
        type: object
        description: Component specification.
      dataSpecifications:
        type: object
        additionalProperties:
          $ref: '#/definitions/v1betaDataSpecification'
        description: |-
          Data specifications.
          The key represents the task, and the value is the corresponding data_specification.
    description: Spec represents a specification data model.
    required:
      - componentSpecification
      - dataSpecifications
  ConnectionMethod:
    type: string
    enum:
      - METHOD_DICTIONARY
      - METHOD_OAUTH
    description: |-
      Method defines how the connection is set up.

       - METHOD_DICTIONARY: Key-value collection. The user is responsible of fetching the connection
      details from the 3rd party service.
       - METHOD_OAUTH: Access token created via OAuth 2.0 authorization.
  EndpointsWebhookEndpoint:
    type: object
    properties:
      url:
        type: string
        description: Webhook URL.
        readOnly: true
      description:
        type: string
        description: Description.
        readOnly: true
    description: WebhookEndpoint describe a webhook endpoint.
  GetFileCatalogResponseChunkType:
    type: string
    enum:
      - CHUNK_TYPE_TEXT
      - CHUNK_TYPE_IMAGE
      - CHUNK_TYPE_AUDIO
      - CHUNK_TYPE_VIDEO
    description: |-
      - CHUNK_TYPE_TEXT: text
       - CHUNK_TYPE_IMAGE: image
       - CHUNK_TYPE_AUDIO: audio
       - CHUNK_TYPE_VIDEO: video
    title: chunk type
  GetFileCatalogResponseMetadata:
    type: object
    properties:
      fileUid:
        type: string
        title: file uid
      fileId:
        type: string
        title: file id
      fileType:
        title: file type
        allOf:
          - $ref: '#/definitions/v1alphaFileType'
      fileSize:
        type: string
        format: int64
        title: file size in bytes
